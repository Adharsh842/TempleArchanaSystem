spring.application.name=TempleArchanaSystem
server.port=8080

# Fish Audio API
fish.audio.api.key=57d553f50b1a4d7b8996aafa5ecdedc6
fish.audio.model.id=

spring.datasource.url=jdbc:mysql://localhost:3306/temple_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.web.resources.static-locations=classpath:/static/

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.com.temple=DEBUG
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/
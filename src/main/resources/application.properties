# ===== LOCAL MySQL CONFIG =====
spring.datasource.url=jdbc:mysql://localhost:3306/temple_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Thymeleaf =====
spring.thymeleaf.cache=false

# ===== Server =====
server.port=8080

# ===== Static resources (for QR codes) =====
spring.web.resources.static-locations=classpath:/static/,file:./qr-codes/
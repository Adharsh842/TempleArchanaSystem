<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Temple System</title>
    <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --saffron:#FF6B00; --saffron2:#FF9500;
            --gold:#FFD700;    --gold2:#FFA500;
            --cream:#FFF8E7;   --dark:#1A0A00;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'DM Sans',sans-serif;
            background:var(--dark);
            min-height:100vh;
            display:flex; align-items:center; justify-content:center;
            overflow:hidden;
        }

        /* ── BACKGROUND ── */
        .bg {
            position:fixed; inset:0; z-index:0;
            background:
                radial-gradient(ellipse 70% 60% at 20% 30%, rgba(255,107,0,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 70% at 80% 70%, rgba(139,0,0,0.2) 0%, transparent 60%),
                radial-gradient(ellipse 80% 80% at 50% 100%, rgba(123,31,162,0.1) 0%, transparent 50%),
                linear-gradient(180deg,#1A0A00,#0D0500);
        }

        /* Mandala rings */
        .ring {
            position:fixed; border-radius:50%;
            border:1px solid rgba(255,165,0,0.06);
            animation:spin linear infinite;
            pointer-events:none; z-index:0;
        }
        .ring::before {
            content:''; position:absolute; inset:15%;
            border-radius:50%; border:1px solid rgba(255,107,0,0.05);
        }
        .r1 { width:700px; height:700px; top:-200px; right:-200px; animation-duration:50s; }
        .r2 { width:500px; height:500px; bottom:-200px; left:-200px; animation-duration:35s; animation-direction:reverse; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── LOGIN CARD ── */
        .login-wrap {
            position:relative; z-index:1;
            width:100%; max-width:420px;
            padding:1rem;
            animation:fadeUp 0.7s ease both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(30px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .login-card {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,165,0,0.15);
            border-radius:24px;
            padding:2.5rem 2rem;
            backdrop-filter:blur(20px);
            box-shadow:0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,165,0,0.05);
        }

        /* ── HEADER ── */
        .login-header { text-align:center; margin-bottom:2rem; }

        .om-circle {
            width:80px; height:80px;
            background:linear-gradient(135deg,rgba(255,107,0,0.2),rgba(139,0,0,0.3));
            border:2px solid rgba(255,165,0,0.3);
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:2.2rem; margin:0 auto 1rem;
            animation:omPulse 3s ease-in-out infinite;
            position:relative;
        }
        .om-circle::before {
            content:''; position:absolute; inset:-6px;
            border-radius:50%; border:1px solid rgba(255,165,0,0.1);
            animation:spin 8s linear infinite;
        }
        @keyframes omPulse {
            0%,100% { box-shadow:0 0 20px rgba(255,107,0,0.2); }
            50%      { box-shadow:0 0 40px rgba(255,107,0,0.5), 0 0 80px rgba(255,215,0,0.1); }
        }

        .login-header h2 {
            font-family:'Yatra One',cursive;
            font-size:1.6rem;
            background:linear-gradient(135deg,var(--gold),var(--saffron2));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; margin-bottom:0.3rem;
        }
        .login-header p {
            color:rgba(255,248,231,0.35); font-size:0.85rem;
        }

        /* ── ERROR ── */
        .alert-error {
            background:rgba(192,57,43,0.12);
            border:1px solid rgba(192,57,43,0.35);
            border-radius:12px; padding:0.75rem 1rem;
            color:#fca5a5; font-size:0.83rem;
            margin-bottom:1.2rem;
            display:flex; align-items:center; gap:0.5rem;
        }

        /* ── FORM ── */
        .form-group { margin-bottom:1.2rem; }
        label {
            display:block; font-size:0.75rem; font-weight:600;
            color:rgba(255,248,231,0.5);
            text-transform:uppercase; letter-spacing:0.8px;
            margin-bottom:0.45rem;
        }
        input[type="text"],
        input[type="password"] {
            width:100%;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,165,0,0.2);
            border-radius:12px;
            padding:0.85rem 1rem;
            color:var(--cream);
            font-family:'DM Sans',sans-serif;
            font-size:0.95rem;
            outline:none; transition:all 0.25s;
        }
        input::placeholder { color:rgba(255,248,231,0.2); }
        input:focus {
            border-color:var(--saffron2);
            background:rgba(255,107,0,0.07);
            box-shadow:0 0 0 3px rgba(255,107,0,0.12);
        }

        /* ── SUBMIT ── */
        .btn-login {
            width:100%; padding:0.95rem;
            background:linear-gradient(135deg,var(--saffron),var(--gold2));
            color:var(--dark); border:none; border-radius:12px;
            font-family:'DM Sans',sans-serif;
            font-size:1rem; font-weight:700;
            cursor:pointer; transition:all 0.3s;
            box-shadow:0 4px 25px rgba(255,107,0,0.35);
            display:flex; align-items:center;
            justify-content:center; gap:0.5rem;
            margin-top:0.5rem;
        }
        .btn-login:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 35px rgba(255,107,0,0.55);
        }
        .btn-login:active { transform:translateY(0); }

        /* ── FOOTER LINKS ── */
        .login-footer {
            margin-top:1.5rem; text-align:center;
        }
        .back-link {
            color:rgba(255,165,0,0.5); text-decoration:none;
            font-size:0.83rem; transition:color 0.2s;
            display:inline-flex; align-items:center; gap:0.3rem;
        }
        .back-link:hover { color:var(--gold); }

        /* ── DIVIDER ── */
        .divider {
            display:flex; align-items:center; gap:0.75rem;
            margin:1.2rem 0 0;
        }
        .divider::before,.divider::after {
            content:''; flex:1; height:1px;
            background:rgba(255,165,0,0.08);
        }
        .divider span { color:rgba(255,248,231,0.15); font-size:0.75rem; }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="ring r1"></div>
<div class="ring r2"></div>

<div class="login-wrap">
    <div class="login-card">

        <!-- HEADER -->
        <div class="login-header">
            <div class="om-circle">🛕</div>
            <h2>Temple Admin Portal</h2>
            <p>Sign in to access the dashboard</p>
        </div>

        <!-- ERROR -->
        <div th:if="${error}" class="alert-error">
            ⚠️ <span th:text="${error}"></span>
        </div>

        <!-- FORM -->
        <form action="/admin/login" method="post">

            <div class="form-group">
                <label for="username">👤 Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">🔒 Password</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">
                🔐 Login to Dashboard
            </button>

        </form>

        <div class="divider"><span>•</span></div>

        <!-- FOOTER -->
        <div class="login-footer">
            <a href="/" class="back-link">← Back to Home</a>
        </div>

    </div>
</div>

</body>
</html>
